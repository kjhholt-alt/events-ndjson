name: release

# Publishes events-ndjson (python) to PyPI on a version tag (e.g. v0.1.0).
# Uses PyPI Trusted Publishing -- NO API token in GitHub secrets.
# See HANDOFF_PYPI.md for the one-time PyPI web-UI configuration.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or commit ref to publish (overrides current ref)"
        required: false

jobs:
  build:
    name: build wheel + sdist
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: build
        working-directory: libraries/python
        run: python -m build --wheel --sdist
      - name: twine check
        working-directory: libraries/python
        run: python -m twine check dist/*
      - name: extract version
        id: version
        working-directory: libraries/python
        run: |
          v=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Built version: $v"
      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: libraries/python/dist/
          retention-days: 7

  publish:
    name: publish to PyPI (trusted publisher)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/events-ndjson
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: publish via trusted publisher
        uses: pypa/gh-action-pypi-publish@release/v1
