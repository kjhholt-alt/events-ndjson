name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: python tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install
        working-directory: libraries/python
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: pytest
        working-directory: libraries/python
        run: pytest -q

  typescript:
    name: typescript tests + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: install
        working-directory: libraries/typescript
        run: npm install
      - name: typecheck
        working-directory: libraries/typescript
        run: npx tsc --noEmit
      - name: build
        working-directory: libraries/typescript
        run: npx tsc
      - name: test
        working-directory: libraries/typescript
        run: npx vitest run

  conformance:
    name: conformance (python + ts)
    runs-on: ubuntu-latest
    needs: [python, typescript]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: install python lib
        working-directory: libraries/python
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: install ts lib + build
        working-directory: libraries/typescript
        run: |
          npm install
          npx tsc
      - name: python conformance
        run: python conformance/conformance.py
      - name: typescript conformance
        run: python conformance/conformance.py --ts
